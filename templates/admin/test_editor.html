{{ define "admin/test_editor.html" }}
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ .title }} — dzrLMS</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f7f0ee;--panel:#fff;--border:#edddd8;--bsoft:#f3e6e2;--text:#2c1a17;--sub:#7a5c57;--muted:#b09590;--accent:#c9796a;--abg:rgba(201,121,106,.1);--success:#5aaa82;--sbg:rgba(90,170,130,.1);--warn:#d4943a;--wbg:rgba(212,148,58,.1)}
*{box-sizing:border-box}
html,body{margin:0;height:100%;overflow:hidden;font-family:'Inter','Segoe UI',system-ui,sans-serif;font-size:.875rem;background:var(--bg);color:var(--text)}
.topbar{height:52px;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 1rem;gap:.75rem;flex-shrink:0;box-shadow:0 1px 4px rgba(44,26,23,.05)}
.shell{display:flex;height:calc(100vh - 52px)}
.q-sidebar{width:200px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.q-sidebar-header{padding:.6rem .75rem;border-bottom:1px solid var(--bsoft);font-size:.62rem;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);font-weight:700}
.q-list{flex:1;overflow-y:auto;padding:.4rem}
.q-item{padding:.42rem .65rem;border-radius:8px;cursor:pointer;font-size:.8rem;color:var(--sub);transition:all .12s;display:flex;align-items:center;gap:.4rem;border:2px solid transparent;margin-bottom:3px}
.q-item:hover{background:var(--bg);color:var(--text)}
.q-item.active{background:var(--abg);color:var(--accent);border-color:var(--accent);font-weight:600}
.q-item .q-num{width:20px;height:20px;border-radius:50%;background:rgba(44,26,23,.06);font-size:.62rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:700}
.q-item.active .q-num{background:var(--accent);color:#fff}
.add-q-btn{margin:.4rem;background:none;border:1px dashed var(--border);border-radius:6px;color:var(--muted);font-size:.75rem;padding:.4rem;cursor:pointer;font-family:inherit;transition:all .15s}
.add-q-btn:hover{border-color:var(--accent);color:var(--accent)}
.q-editor{flex:1;overflow-y:auto;padding:2rem;display:flex;flex-direction:column;gap:1rem}
.q-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:1.25rem;box-shadow:0 1px 4px rgba(44,26,23,.05)}
.q-label{font-size:.62rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:700;margin-bottom:.4rem}
.q-textarea{width:100%;border:1px solid var(--border);border-radius:9px;background:var(--bg);color:var(--text);padding:.65rem .85rem;font-size:.9rem;font-family:inherit;resize:vertical;min-height:70px;outline:none;transition:border-color .15s}
.q-textarea:focus{border-color:var(--accent)}
.q-input{width:100%;border:1px solid var(--border);border-radius:9px;background:var(--bg);color:var(--text);padding:.55rem .85rem;font-size:.85rem;font-family:inherit;outline:none;transition:border-color .15s;margin-bottom:.35rem}
.q-input:focus{border-color:var(--accent)}
.answer-row{display:flex;align-items:center;gap:.5rem;margin-bottom:.4rem;padding:.5rem .65rem;background:var(--bg);border:1px solid var(--border);border-radius:9px;transition:border-color .15s}
.answer-row.correct{background:var(--sbg);border-color:var(--success)}
.answer-row input[type=text]{flex:1;border:none;background:transparent;color:var(--text);font-family:inherit;font-size:.855rem;outline:none}
.answer-row .correct-toggle{background:none;border:2px solid var(--border);border-radius:50%;width:22px;height:22px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.75rem;transition:all .15s;padding:0}
.answer-row.correct .correct-toggle{background:var(--success);border-color:var(--success);color:#fff}
.answer-row .del-ans{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.8rem;padding:2px;border-radius:4px;transition:color .15s}
.answer-row .del-ans:hover{color:#c95c5c}
.add-ans-btn{background:var(--bg);border:1px dashed var(--border);border-radius:8px;color:var(--muted);font-size:.78rem;padding:.38rem .75rem;cursor:pointer;font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;gap:4px}
.add-ans-btn:hover{border-color:var(--accent);color:var(--accent)}
.media-preview{max-width:100%;max-height:150px;border-radius:8px;border:1px solid var(--border);margin-top:.4rem;display:none}
.pub-side{width:220px;background:var(--panel);border-left:1px solid var(--border);overflow-y:auto;flex-shrink:0;padding:.75rem;display:none}
.pub-side.open{display:block}
.chip-list{display:flex;flex-wrap:wrap;gap:.3rem;max-height:200px;overflow-y:auto}
.chip{display:inline-flex;align-items:center;gap:4px;background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:.22rem .6rem;font-size:.72rem;color:var(--sub);cursor:pointer;user-select:none;transition:all .14s}
.chip.sel{background:var(--sbg);border-color:var(--success);color:var(--success);font-weight:600}
.chip-dot{width:6px;height:6px;border-radius:50%;background:transparent}
.chip.sel .chip-dot{background:var(--success)}
.btn-pub{background:var(--success);border:none;color:#fff;border-radius:8px;padding:.42rem 1rem;font-size:.82rem;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-family:inherit;width:100%;justify-content:center;margin-top:.75rem}
.btn-pub:hover{background:#499e72}
.toast-msg{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--success);color:#fff;padding:.6rem 1.2rem;border-radius:10px;font-size:.855rem;font-weight:600;z-index:9999;opacity:0;transition:opacity .3s}
.toast-msg.show{opacity:1}
.btn-preview-btn{background:none;border:1px solid var(--border);color:var(--sub);border-radius:8px;padding:.4rem .85rem;font-size:.8rem;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all .15s;font-family:inherit}
.btn-preview-btn:hover{background:var(--bsoft);color:var(--text)}
.preview-overlay{display:none;position:fixed;inset:0;background:rgba(44,26,23,.5);backdrop-filter:blur(3px);z-index:9000;align-items:center;justify-content:center}
.preview-overlay.open{display:flex}
.preview-box{background:var(--panel);border-radius:14px;width:640px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(44,26,23,.2)}
.preview-header{padding:1rem 1.25rem;border-bottom:1px solid var(--bsoft);display:flex;justify-content:space-between;align-items:center;font-weight:700;font-size:.95rem}
</style>
</head>
<body>

<div class="topbar">
  <a href="/admin/tests" style="color:var(--muted);text-decoration:none;font-size:.82rem;display:flex;align-items:center;gap:4px"><i class="bi bi-arrow-left"></i> Тесты</a>
  <span style="color:var(--border)">|</span>
  <input type="text" id="testTitle" style="border:none;background:transparent;font-weight:700;font-size:.9rem;color:var(--text);outline:none;font-family:inherit;flex:1"
    placeholder="Название теста…" value="{{ if .test }}{{ .test.Title }}{{ end }}">
  <div style="display:flex;gap:.5rem;margin-left:auto;align-items:center">
    <span id="saveStatus" style="font-size:.75rem;color:var(--muted)"></span>
    <button class="btn-preview-btn" onclick="openPreview()"><i class="bi bi-eye"></i> Превью</button>
    <button style="background:var(--success);border:none;color:#fff;border-radius:8px;padding:.42rem 1rem;font-size:.82rem;font-weight:600;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:6px"
      onclick="togglePubPanel()">
      <i class="bi bi-send-fill"></i> Опубликовать
    </button>
  </div>
</div>

<div class="shell">
  <div class="q-sidebar">
    <div class="q-sidebar-header">Вопросы</div>
    <div class="q-list" id="qList"></div>
    <button class="add-q-btn" onclick="addQuestion()"><i class="bi bi-plus-lg"></i> Добавить вопрос</button>
  </div>

  <div class="q-editor" id="qEditor"></div>

  <div class="pub-side" id="pubSide">
    <div style="font-size:.62rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:700;margin-bottom:.6rem">Назначить при публикации</div>
    <label class="chip mb-2" id="chipAll" onclick="toggleChipAll()" style="display:inline-flex;margin-bottom:.5rem">
      <span class="chip-dot"></span> Все сотрудники
    </label>
    <div class="chip-list" id="pubEmpList">
      {{ range .employees }}
      <div class="chip" data-uid="{{ .ID }}" onclick="this.classList.toggle('sel');updateDot(this)">
        <span class="chip-dot"></span>{{ .Name }}
      </div>
      {{ end }}
    </div>
    <button class="btn-pub" onclick="doPublish()"><i class="bi bi-send-fill"></i> Опубликовать тест</button>
  </div>
</div>

<div class="preview-overlay" id="previewOverlay">
  <div class="preview-box">
    <div class="preview-header">
      <span><i class="bi bi-eye me-2" style="color:var(--accent)"></i>Предпросмотр — вид сотрудника</span>
      <button onclick="closePreview()" style="background:none;border:none;color:var(--muted);font-size:1rem;cursor:pointer"><i class="bi bi-x-lg"></i></button>
    </div>
    <div id="previewContent" style="padding:1.25rem"></div>
  </div>
</div>

<div class="toast-msg" id="toast"></div>

<script>
var testID   = {{ if .test }}{{ .test.ID }}{{ else }}0{{ end }};
var activeQ  = 0;
var questions = [];

{{ if .test }}
(function(){
  var raw = {{ if .testJSON }}{{ .testJSON | safe }}{{ else }}null{{ end }};
  if(raw && raw.questions) {
    questions = raw.questions.map(function(q){
      return {id:q.id||0,content:q.content||'',media_url:q.media_url||'',answers:(q.answers||[]).map(function(a){
        return{id:a.id||0,content:a.content||'',media_url:a.media_url||'',is_correct:!!a.is_correct};
      })};
    });
  }
})();
{{ end }}
if(!questions.length) questions.push({id:0,content:'',media_url:'',answers:[{id:0,content:'',media_url:'',is_correct:false}]});

function render(){
  renderQList();
  renderQEditor();
}

function renderQList(){
  var ul=document.getElementById('qList'); ul.innerHTML='';
  questions.forEach(function(q,i){
    var div=document.createElement('div');
    div.className='q-item'+(i===activeQ?' active':'');
    div.innerHTML='<span class="q-num">'+(i+1)+'</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+(q.content||'Вопрос '+(i+1))+'</span>';
    div.onclick=function(){activeQ=i;render();};
    ul.appendChild(div);
  });
}

function renderQEditor(){
  var editor=document.getElementById('qEditor'); editor.innerHTML='';
  var q=questions[activeQ];

  var card=document.createElement('div');
  card.className='q-card';

  card.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem">'
    +'<div class="q-label">Вопрос '+(activeQ+1)+'</div>'
    +'<button style="background:var(--wbg);border:1px solid rgba(212,148,58,.3);color:var(--warn);border-radius:7px;padding:.22rem .6rem;font-size:.72rem;cursor:pointer;font-family:inherit" onclick="deleteQuestion('+activeQ+')">'
    +'<i class="bi bi-trash-fill"></i> Удалить вопрос</button></div>'
    +'<textarea class="q-textarea" id="qContent" placeholder="Текст вопроса…" oninput="questions['+activeQ+'].content=this.value;renderQList()">'+escH(q.content)+'</textarea>'
    +'<div style="display:flex;gap:.5rem;align-items:center;margin-top:.5rem">'
    +'<input type="file" id="qMediaFile" accept="image/*,video/*" style="display:none" onchange="uploadQMedia(this)">'
    +'<button class="add-ans-btn" onclick="document.getElementById(\'qMediaFile\').click()"><i class="bi bi-image"></i> Добавить медиа</button>'
    +'<button class="add-ans-btn" onclick="addQLink()"><i class="bi bi-link-45deg"></i> Добавить ссылку</button>'
    +(q.media_url?'<button class="add-ans-btn" onclick="removeQMedia()"><i class="bi bi-x-lg"></i> Убрать медиа</button>':'')
    +'</div>'
    +renderMediaPreview(q.media_url);

  card.innerHTML+='<hr style="border-color:var(--bsoft);margin:1rem 0">'
    +'<div class="q-label">Варианты ответа</div>'
    +'<div id="answerList"></div>'
    +'<button class="add-ans-btn" onclick="addAnswer()"><i class="bi bi-plus-lg"></i> Добавить ответ</button>';

  editor.appendChild(card);

  var al=document.getElementById('answerList');
  q.answers.forEach(function(a,ai){
    var row=document.createElement('div');
    row.className='answer-row'+(a.is_correct?' correct':'');
    row.innerHTML='<button class="correct-toggle" title="Отметить правильным" onclick="toggleCorrect('+ai+')">'
      +(a.is_correct?'<i class="bi bi-check-lg"></i>':'')+'</button>'
      +'<input type="text" placeholder="Вариант ответа…" value="'+escA(a.content)+'" oninput="questions['+activeQ+'].answers['+ai+'].content=this.value">'
      +'<button class="del-ans" onclick="deleteAnswer('+ai+')" title="Удалить"><i class="bi bi-x-lg"></i></button>';
    al.appendChild(row);
  });
}

function addQuestion(){
  questions.push({id:0,content:'',media_url:'',answers:[{id:0,content:'',media_url:'',is_correct:false}]});
  activeQ=questions.length-1;
  render();
}
function deleteQuestion(i){
  if(questions.length<=1){alert('Тест должен содержать хотя бы один вопрос.');return;}
  if(!confirm('Удалить вопрос?'))return;
  questions.splice(i,1);
  if(activeQ>=questions.length)activeQ=questions.length-1;
  render();
}
function addAnswer(){
  questions[activeQ].answers.push({id:0,content:'',media_url:'',is_correct:false});
  render();
}
function deleteAnswer(ai){
  if(questions[activeQ].answers.length<=1){alert('Должен быть хотя бы один вариант.');return;}
  questions[activeQ].answers.splice(ai,1);
  render();
}
function toggleCorrect(ai){
  questions[activeQ].answers[ai].is_correct=!questions[activeQ].answers[ai].is_correct;
  render();
}
function uploadQMedia(input){
  var file=input.files[0]; if(!file)return;
  var fd=new FormData(); fd.append('file',file);
  fetch('/admin/tests/upload',{method:'POST',body:fd})
    .then(function(r){return r.json();})
    .then(function(d){if(d.url){questions[activeQ].media_url=d.url;render();}});
  input.value='';
}
function addQLink(){
  var url=prompt('Вставьте ссылку (видео или любой ресурс):', questions[activeQ].media_url||'https://');
  if(url===null) return;
  questions[activeQ].media_url=url.trim();
  render();
}
function removeQMedia(){
  questions[activeQ].media_url='';
  render();
}

function isVideoURL(url){
  var lower=(url||'').toLowerCase();
  return /\.(mp4|webm|ogg|mov|m4v)$/.test(lower) || lower.indexOf('youtube.com')>=0 || lower.indexOf('youtu.be')>=0;
}
function isImageURL(url){
  return /\.(jpg|jpeg|png|gif|webp|svg)$/.test((url||'').toLowerCase());
}
function youtubeEmbedURL(url){
  var m=(url||'').match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  return m ? 'https://www.youtube.com/embed/'+m[1] : '';
}
function renderMediaPreview(url){
  if(!url) return '';
  var yt=youtubeEmbedURL(url);
  if(yt) return '<iframe src="'+escA(yt)+'" style="width:100%;max-width:400px;height:225px;border:none;border-radius:8px;margin-top:.4rem;display:block" allowfullscreen></iframe>';
  if(isImageURL(url)) return '<img src="'+escA(url)+'" class="media-preview" style="display:block">';
  if(isVideoURL(url)) return '<video src="'+escA(url)+'" controls style="max-width:100%;max-height:200px;border-radius:8px;margin-top:.4rem;display:block"></video>';
  return '<a href="'+escA(url)+'" target="_blank" rel="noreferrer" style="display:inline-flex;align-items:center;color:var(--accent);background:var(--abg);padding:.4rem .7rem;border-radius:8px;margin-top:.4rem;text-decoration:none;font-size:.8rem"><i class="bi bi-box-arrow-up-right me-2"></i>'+escH(url)+'</a>';
}

var saveInFlight = false;

async function saveTest(opts){
  opts = opts || {};
  var title=document.getElementById('testTitle').value.trim();
  if(!title){
    if(!opts.silent) alert('Введите название теста.');
    return false;
  }
  var url=testID>0?'/admin/tests/'+testID+'/save':'/admin/tests/save';
  var payload={
    title:title,
    questions:questions.map(function(q,i){
      return{id:q.id||0,content:q.content,media_url:q.media_url,
        answers:q.answers.map(function(a,j){
          return{id:a.id||0,content:a.content,media_url:a.media_url,is_correct:a.is_correct};
        })};
    })
  };
  saveInFlight = true;
  try {
    var resp=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    var data=await resp.json();
    if(data.id){testID=data.id;history.replaceState(null,'','/admin/tests/'+testID+'/edit');}
    var status=document.getElementById('saveStatus');
    if(status){
      status.textContent='Сохранено';
      setTimeout(function(){status.textContent='';},1500);
    }
    if(!opts.silent) showToast('Тест сохранён');
    return true;
  } catch(e){
    return false;
  } finally {
    saveInFlight = false;
  }
}

setInterval(function(){
  if(!saveInFlight) saveTest({silent:true});
}, 4000);

function togglePubPanel(){ var p=document.getElementById('pubSide'); p.classList.toggle('open'); }
function toggleChipAll(){
  var chip=document.getElementById('chipAll'); chip.classList.toggle('sel');
  var on=chip.classList.contains('sel');
  document.querySelectorAll('#pubEmpList .chip').forEach(function(c){if(on)c.classList.add('sel');else c.classList.remove('sel');updateDot(c);});
  updateDot(chip);
}
function updateDot(chip){ chip.querySelector('.chip-dot').style.background=chip.classList.contains('sel')?'var(--success)':'transparent'; }
async function doPublish(){
  var ok=await saveTest({silent:true});
  if(!ok){alert('Введите название теста перед публикацией.');return;}
  var assignAll=document.getElementById('chipAll').classList.contains('sel');
  var userIDs=[];
  if(!assignAll) document.querySelectorAll('#pubEmpList .chip.sel').forEach(function(c){userIDs.push(+c.dataset.uid);});
  var resp=await fetch('/admin/tests/'+testID+'/publish',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({assign_all:assignAll,user_ids:userIDs})
  });
  if(resp.ok){showToast('Тест опубликован! Назначения созданы.');setTimeout(function(){window.location='/admin/dashboard';},1500);}
}

function openPreview(){
  var html='';
  questions.forEach(function(q,i){
    html+='<div class="q-card" style="margin-bottom:1rem">';
    html+='<div class="q-label">Вопрос '+(i+1)+'</div>';
    html+='<div style="font-weight:600;margin-bottom:.6rem">'+escH(q.content||'')+'</div>';
    html+=renderMediaPreview(q.media_url);
    q.answers.forEach(function(a){
      html+='<div class="answer-row'+(a.is_correct?' correct':'')+'" style="cursor:default;margin-top:.5rem">'
        +'<span class="correct-toggle" style="border:none;background:transparent">'+(a.is_correct?'<i class="bi bi-check-circle-fill" style="color:var(--success)"></i>':'<i class="bi bi-circle" style="color:var(--muted)"></i>')+'</span>'
        +'<span>'+escH(a.content||'')+'</span></div>';
    });
    html+='</div>';
  });
  document.getElementById('previewContent').innerHTML=html;
  document.getElementById('previewOverlay').classList.add('open');
}
function closePreview(){ document.getElementById('previewOverlay').classList.remove('open'); }
document.getElementById('previewOverlay').addEventListener('click',function(e){if(e.target===this)closePreview();});

function escH(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escA(s){return String(s).replace(/"/g,'&quot;');}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2800);}

render();
</script>
</body>
</html>
{{ end }}
